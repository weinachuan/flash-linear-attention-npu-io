name: Sync upstream PR catalog

on:
  schedule:
    - cron: "0 0,6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-pr-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync upstream pull request catalog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/sync_pr_catalog.py

      - name: Commit catalog changes
        run: |
          if git diff --quiet -- data/pr-catalog.json docs/pr-catalog.json data/project-state.json docs/project-state.json data/audit-log.jsonl docs/audit-log.jsonl; then
            echo "No PR catalog or linked-risk changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pr-catalog.json docs/pr-catalog.json data/project-state.json docs/project-state.json data/audit-log.jsonl docs/audit-log.jsonl
          git commit -m "同步上游 PR 候选池和关联风险"
          git push
