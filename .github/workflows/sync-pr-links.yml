name: Scan upstream PR candidates

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-pr-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan upstream pull requests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/sync_pr_links.py --format markdown
