name: Sync upstream PR links

on:
  schedule:
    - cron: "0 0,6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-pr-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan upstream pull requests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/sync_pr_links.py

      - name: Commit changes
        run: |
          if git diff --quiet -- data/project-state.json docs/project-state.json data/audit-log.jsonl docs/audit-log.jsonl; then
            echo "No PR link or risk changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/project-state.json docs/project-state.json data/audit-log.jsonl docs/audit-log.jsonl
          git commit -m "自动同步上游 PR 链接和风险"
          git pull --rebase origin main
          git push
