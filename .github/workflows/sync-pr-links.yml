name: Sync upstream PR links

on:
  schedule:
    - cron: "0 0,6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-pr-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scan upstream pull requests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/sync_pr_links.py --dry-run

      - name: Commit pending review table
        run: |
          if git diff --quiet -- data/pending-pr-sync.json docs/pending-pr-sync.json; then
            echo "No pending PR sync changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pending-pr-sync.json docs/pending-pr-sync.json
          git commit -m "生成待确认 PR 同步表"
          git pull --rebase origin main
          git push
