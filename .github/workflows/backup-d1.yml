name: Backup Cloudflare D1

on:
  schedule:
    # 02:00 Beijing time.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-d1-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Back up JSON snapshots from Worker
        env:
          FLASH_IO_ADMIN_TOKEN: ${{ secrets.FLASH_IO_ADMIN_TOKEN }}
        run: python scripts/backup_cloudflare.py

      - name: Export full D1 SQL backup
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p .backup
          npx wrangler d1 export flash-linear-attention-npu-io --remote --output=.backup/d1-latest.sql

      - name: Upload SQL backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-latest-sql
          path: .backup/d1-latest.sql
          retention-days: 30

      - name: Commit JSON snapshot changes
        run: |
          if git diff --quiet -- data/project-state.json docs/project-state.json data/audit-log.jsonl docs/audit-log.jsonl data/pr-catalog.json docs/pr-catalog.json; then
            echo "No D1 snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/project-state.json docs/project-state.json data/audit-log.jsonl docs/audit-log.jsonl data/pr-catalog.json docs/pr-catalog.json
          git commit -m "Backup Cloudflare D1 snapshots"
          git push
