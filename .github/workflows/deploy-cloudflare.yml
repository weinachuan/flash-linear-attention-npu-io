name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/**"
      - "migrations/**"
      - "package.json"
      - "package-lock.json"
      - "wrangler.toml"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: "Apply remote D1 migrations before deploying"
        required: true
        type: boolean
        default: true
      deploy_worker:
        description: "Deploy Worker"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: cloudflare-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Validate Cloudflare config
        shell: bash
        run: |
          if grep -q "replace-with-cloudflare-d1-database-id" wrangler.toml; then
            echo "wrangler.toml still contains placeholder database_id."
            exit 1
          fi
          node --check cloudflare/worker.js
          npx wrangler --version

      - name: Apply remote D1 migrations
        if: ${{ github.event_name == 'push' || inputs.apply_migrations }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply flash-linear-attention-npu-io --remote

      - name: Deploy Worker
        if: ${{ github.event_name == 'push' || inputs.deploy_worker }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
