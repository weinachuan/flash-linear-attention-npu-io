<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>人员提前完成统计 - flash-linear-attention-npu</title>
  <link rel="stylesheet" href="./styles.css?v=20260626-delivery-score-v2">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Delivery Scoreboard</p>
        <h1>人员提前完成统计</h1>
        <p class="meta" id="meta">读取项目数据中</p>
        <nav class="hero-links" aria-label="项目导航">
          <a href="./index.html">项目看板</a>
          <a href="./user-guide.html">使用说明</a>
          <a href="./design-diagrams.html">设计图</a>
        </nav>
      </div>
      <div class="summary" id="summary"></div>
    </header>

    <section class="panel">
      <div class="panel-title-row">
        <h2>统计口径</h2>
      </div>
      <div class="delivery-rule">
        <span>已完成且填写完成日期：提前天数 = 原计划 DDL - 完成日期；延期天数 = 完成日期 - 原计划 DDL。</span>
        <span>当前 delay 且未完成：按今天到原计划 DDL 的差值实时扣分；延期承诺日期只作为参考，不改变扣分基准。</span>
        <span>历史 done 但没有完成日期：单独列为待补录，不参与净天数统计，避免伪造历史完成时间。</span>
        <span>同一任务有多个责任人时，每个责任人各记录一份完整提前/延期天数。</span>
      </div>
    </section>

    <section class="panel">
      <h2>人员汇总</h2>
      <div id="peopleStats" class="stats-grid"></div>
    </section>

    <section class="panel">
      <h2>任务明细</h2>
      <div class="table-wrap stats-table-wrap">
        <table class="stats-table">
          <thead>
            <tr>
              <th>责任人</th>
              <th>类型</th>
              <th>任务</th>
              <th>计划 DDL</th>
              <th>完成日期</th>
              <th>延期承诺</th>
              <th>提前</th>
              <th>延期</th>
              <th>净天数</th>
            </tr>
          </thead>
          <tbody id="taskStats"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="./config.js?v=20260626-delivery-score-v2"></script>
  <script>
    const WORKER_API_BASE = String(window.FLASH_IO_API_BASE || localStorage.getItem("flashWorkerApiBase") || "").replace(/\/+$/, "");
    const PLACEHOLDER_OWNERS = new Set(["待排人力", "待填写", "对应算子责任人"]);

    loadStats().catch((error) => {
      document.querySelector("#meta").textContent = `读取失败：${error.message || error}`;
    });

    async function loadStats() {
      const data = await loadProjectState();
      const today = todayBjYmd();
      const entries = deliveryEntries(data.tasks || [], today);
      const scored = entries.filter((entry) => entry.counted);
      const missing = entries.filter((entry) => !entry.counted);
      const people = peopleSummary(scored);
      document.querySelector("#meta").textContent = `数据更新时间：${data.generatedAt || "未知"} · 当前日期：${today} · 已计分 ${scored.length} 条人员任务记录 · 待补录 ${missing.length} 条`;
      document.querySelector("#summary").innerHTML = [
        ["计分人次", scored.length],
        ["提前合计", `+${sum(scored, "earlyDays")}`],
        ["延期扣分", `-${sum(scored, "delayDays")}`],
        ["净天数", signed(sum(scored, "netDays"))],
        ["待补录", missing.length],
      ].map(([label, value]) => `<div class="summary-card"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`).join("");
      renderPeople(people);
      renderEntries(entries);
    }

    async function loadProjectState() {
      if (WORKER_API_BASE) {
        const response = await fetch(`${WORKER_API_BASE}/api/export`);
        if (!response.ok) throw new Error(`Worker API ${response.status}`);
        return response.json();
      }
      const response = await fetch(`./project-state.json?v=${Date.now()}`);
      if (!response.ok) throw new Error("未读取到 project-state.json");
      return response.json();
    }

    function deliveryEntries(tasks, today) {
      return tasks.flatMap((task) => {
        if (!isYmd(task.end_date)) return [];
        const owners = ownerNames(task.owner)
          .filter((owner) => owner && !PLACEHOLDER_OWNERS.has(owner));
        if (!owners.length) return [];

        if (task.status === "done") {
          if (!isYmd(task.done_date)) {
            return owners.map((owner) => entryForTask(task, owner, {
              type: "missing",
              typeLabel: "待补录完成日期",
              counted: false,
              doneDate: "",
              earlyDays: 0,
              delayDays: 0,
              netDays: 0,
            }));
          }
          const delta = daysBetween(task.done_date, task.end_date);
          const earlyDays = Math.max(0, delta);
          const delayDays = Math.max(0, -delta);
          return owners.map((owner) => entryForTask(task, owner, {
            type: earlyDays > 0 ? "early" : delayDays > 0 ? "late" : "ontime",
            typeLabel: earlyDays > 0 ? "提前完成" : delayDays > 0 ? "延期完成" : "按期完成",
            counted: true,
            doneDate: task.done_date,
            earlyDays,
            delayDays,
            netDays: earlyDays - delayDays,
          }));
        }

        if (task.status === "delayed") {
          const delayDays = Math.max(0, daysBetween(task.end_date, today));
          return owners.map((owner) => entryForTask(task, owner, {
            type: "delayed",
            typeLabel: "当前延期",
            counted: true,
            doneDate: "",
            earlyDays: 0,
            delayDays,
            netDays: -delayDays,
          }));
        }

        return [];
      });
    }

    function entryForTask(task, owner, values) {
      return {
        owner,
        taskId: task.id,
        title: task.title || task.id,
        ddl: task.end_date,
        recommitDate: task.recommit_date || "",
        ...values,
      };
    }

    function peopleSummary(entries) {
      const map = new Map();
      entries.forEach((entry) => {
        if (!map.has(entry.owner)) {
          map.set(entry.owner, { owner: entry.owner, count: 0, earlyDays: 0, delayDays: 0, netDays: 0, delayedCount: 0 });
        }
        const item = map.get(entry.owner);
        item.count += 1;
        item.earlyDays += entry.earlyDays;
        item.delayDays += entry.delayDays;
        item.netDays += entry.netDays;
        if (entry.type === "delayed" || entry.type === "late") item.delayedCount += 1;
      });
      return [...map.values()].sort((a, b) => b.netDays - a.netDays || b.earlyDays - a.earlyDays || a.owner.localeCompare(b.owner, "zh-CN"));
    }

    function renderPeople(people) {
      document.querySelector("#peopleStats").innerHTML = people.length
        ? people.map((person) => `
          <article class="stat-person-card ${person.netDays < 0 ? "negative" : "positive"}">
            <strong>${escapeHtml(person.owner)}</strong>
            <span>${person.count} 项计分任务 · ${person.delayedCount} 项延期</span>
            <b>${signed(person.netDays)} 天</b>
            <small>提前 ${person.earlyDays} 天 · 延期扣 ${person.delayDays} 天</small>
          </article>
        `).join("")
        : `<p class="empty">暂无可计分任务。已完成但缺完成日期的任务会列在下方待补录。</p>`;
    }

    function renderEntries(entries) {
      document.querySelector("#taskStats").innerHTML = entries.length
        ? entries.sort(compareEntry).map((entry) => `
          <tr>
            <td>${escapeHtml(entry.owner)}</td>
            <td><span class="stat-pill ${typeClass(entry)}">${escapeHtml(entry.typeLabel)}</span></td>
            <td>${escapeHtml(entry.title)}</td>
            <td>${escapeHtml(entry.ddl)}</td>
            <td>${entry.doneDate ? escapeHtml(entry.doneDate) : `<span class="muted-cell">-</span>`}</td>
            <td>${entry.recommitDate ? escapeHtml(entry.recommitDate) : `<span class="muted-cell">-</span>`}</td>
            <td><span class="stat-pill positive">+${entry.earlyDays}</span></td>
            <td><span class="stat-pill negative">-${entry.delayDays}</span></td>
            <td><span class="stat-pill ${entry.counted ? entry.netDays < 0 ? "negative" : "positive" : "neutral"}">${entry.counted ? signed(entry.netDays) : "未计分"}</span></td>
          </tr>
        `).join("")
        : `<tr><td colspan="9" class="empty">暂无可统计记录。</td></tr>`;
    }

    function compareEntry(a, b) {
      return Number(b.counted) - Number(a.counted)
        || a.type.localeCompare(b.type)
        || a.netDays - b.netDays
        || a.ddl.localeCompare(b.ddl)
        || a.owner.localeCompare(b.owner, "zh-CN")
        || a.title.localeCompare(b.title, "zh-CN");
    }

    function typeClass(entry) {
      if (!entry.counted) return "neutral";
      if (entry.type === "early") return "positive";
      if (entry.type === "delayed" || entry.type === "late") return "negative";
      return "neutral";
    }

    function ownerNames(owner) {
      return String(owner || "")
        .split(/[、/，,;；&]+/)
        .map((item) => normalizeOwner(item))
        .filter(Boolean);
    }

    function normalizeOwner(value) {
      const text = String(value || "").trim();
      return !text || text === "待填写" ? "待排人力" : text;
    }

    function todayBjYmd() {
      return new Intl.DateTimeFormat("sv-SE", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).format(new Date());
    }

    function isYmd(value) {
      return /^\d{4}-\d{2}-\d{2}$/.test(String(value || ""));
    }

    function daysBetween(a, b) {
      return Math.round((Date.parse(b) - Date.parse(a)) / 86400000);
    }

    function signed(value) {
      return `${Number(value) >= 0 ? "+" : ""}${Number(value)}`;
    }

    function sum(items, field) {
      return items.reduce((total, item) => total + Number(item[field] || 0), 0);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
    }
  </script>
</body>
</html>
